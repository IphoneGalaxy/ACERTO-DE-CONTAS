        const [familyCode, setFamilyCode] = useState('');
        const [error, setError] = useState(initialError);
        const [loading, setLoading] = useState(false);

        const validEmail = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email.trim());
        const validPassword = password.length >= 8;
        const hasFamilyCode = !!familyCode.trim();

        const handleEmailAuth = async () => {
          if (!validEmail || !validPassword) return;
          setError('');
          setLoading(true);
          const fb = window.FirebaseLib;
          try {
            if (hasFamilyCode) stashPendingJoinCode(familyCode);
            else sessionStorage.removeItem('meuAcertoPendingJoinCode');
            if (mode === 'register') {
              const cred = await fb.createUserWithEmailAndPassword(auth, email.trim(), password);
              await ensureUserProfile(window._meuAcertoDb, cred.user);
            } else {
              await fb.signInWithEmailAndPassword(auth, email.trim(), password);
            }
          } catch (e) {
            if (hasFamilyCode) sessionStorage.removeItem('meuAcertoPendingJoinCode');
            setError(authErrorMessage(e.code, { mode, hasFamilyCode }));
          } finally {
            setLoading(false);
          }
        };

        const handleGoogle = async () => {
          setError('');
          setLoading(true);
          const fb = window.FirebaseLib;
          try {
            if (hasFamilyCode) stashPendingJoinCode(familyCode);
            else sessionStorage.removeItem('meuAcertoPendingJoinCode');
            const provider = new fb.GoogleAuthProvider();
            const cred = await fb.signInWithPopup(auth, provider);
            await ensureUserProfile(window._meuAcertoDb, cred.user);
          } catch (e) {
            if (hasFamilyCode) sessionStorage.removeItem('meuAcertoPendingJoinCode');
            setError(authErrorMessage(e.code, { mode, hasFamilyCode }));
          } finally {
            setLoading(false);
          }
        };

        return (
          <div className="min-h-screen flex flex-col justify-center items-center p-6 bg-slate-50 dark:bg-slate-900">
            <h1 className="text-4xl font-bold mb-2 text-slate-800 dark:text-white">Meu Acerto</h1>
            <p className="text-sm text-slate-600 dark:text-slate-400 mb-6 text-center max-w-sm">
              Crie uma conta para configurar a família, ou vincule-se com o código compartilhado
            </p>
            <div className="w-full max-w-sm space-y-4">
              <div className="bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl p-4 space-y-3">
                <p className="text-sm font-medium text-slate-700 dark:text-slate-200">Código da família</p>
                <p className="text-xs text-slate-500">
                  Cole o código e use <strong>Criar conta</strong> abaixo (primeira vez) ou <strong>Entrar</strong> se já tiver cadastro
                </p>
                <input className={ui.input} placeholder="Cole o código da família"
                  value={familyCode} onChange={(e) => {
                    const v = e.target.value;
                    setFamilyCode(v);
                    if (v.trim()) setMode('register');
                  }} />
              </div>

              <div className="flex bg-slate-100 dark:bg-slate-800 rounded-xl p-1">
                <button onClick={() => { setMode('login'); setError(''); }}
                  className={`flex-1 py-2 rounded-lg text-sm font-medium ${mode === 'login' ? 'bg-white dark:bg-slate-700 shadow text-indigo-600' : 'text-slate-500'}`}>
                  Entrar
                </button>
                <button onClick={() => { setMode('register'); setError(''); }}
                  className={`flex-1 py-2 rounded-lg text-sm font-medium ${mode === 'register' ? 'bg-white dark:bg-slate-700 shadow text-indigo-600' : 'text-slate-500'}`}>
                  Criar conta
                </button>
              </div>
              {hasFamilyCode && mode === 'login' && (
                <p className="text-xs text-amber-600 dark:text-amber-400 text-center">
                  Primeira vez com este e-mail? Troque para <button type="button" onClick={() => setMode('register')} className="underline font-medium">Criar conta</button>
                </p>
              )}
              <div>
                <label className={ui.label}>E-mail</label>
                <input type="email" className={ui.input} placeholder="seu@email.com"
                  value={email} onChange={(e) => setEmail(e.target.value)} />
              </div>
              <div>
                <label className={ui.label}>Senha (mín. 8 caracteres)</label>
                <input type="password" className={ui.input} placeholder="••••••••"
                  value={password} onChange={(e) => setPassword(e.target.value)} />
              </div>
              {error && <p className="text-sm text-red-500 text-center">{error}</p>}
              <button disabled={!validEmail || !validPassword || loading} onClick={handleEmailAuth}
                className="w-full py-3 rounded-xl bg-indigo-600 text-white font-semibold disabled:opacity-50">
                {loading ? 'Aguarde...' : (
                  hasFamilyCode
                    ? (mode === 'register' ? 'Criar conta e vincular' : 'Entrar e vincular')
                    : (mode === 'register' ? 'Criar conta' : 'Entrar')
                )}
              </button>
              <div className="flex items-center gap-3">
                <div className="flex-1 h-px bg-slate-200 dark:bg-slate-700" />
                <span className="text-xs text-slate-400">ou</span>
                <div className="flex-1 h-px bg-slate-200 dark:bg-slate-700" />
              </div>
              <button disabled={loading} onClick={handleGoogle}
                className="w-full py-3 rounded-xl bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 text-slate-700 dark:text-slate-200 font-semibold hover:bg-slate-50 dark:hover:bg-slate-700 disabled:opacity-50">
                {hasFamilyCode ? 'Google e vincular à família' : 'Continuar com Google'}
              </button>
            </div>
          </div>
        );
      };

      const SetupWizard = ({ onComplete, existingConfig, initialStep, db, uid, userEmail, onSignOut, isGuest }) => {
        const [step, setStep] = useState(initialStep || (existingConfig?.setupComplete ? 'select' : 'welcome'));
        const [mode, setMode] = useState('create');
        const [joinCode, setJoinCode] = useState('');
        const [personAName, setPersonAName] = useState(existingConfig ? nameA(existingConfig) : '');
        const [personBName, setPersonBName] = useState(existingConfig ? nameB(existingConfig) : '');
        const [cards, setCards] = useState(existingConfig?.cards?.length ? existingConfig.cards : []);
        const [householdId, setHouseholdId] = useState(existingConfig?.householdId || '');
        const [copied, setCopied] = useState(false);
        const [joinLoading, setJoinLoading] = useState(false);
        const [joinError, setJoinError] = useState('');
        const [saveError, setSaveError] = useState('');

        const addCard = () => {
          setCards((prev) => [...prev, { id: generateId(), label: '', last4: '', owner: 'personA', bankId: '' }]);
        };

        const updateCard = (id, field, value) => {
          setCards((prev) => prev.map((c) => c.id === id ? { ...c, [field]: value } : c));
        };

        const removeCard = (id) => {
          setCards((prev) => prev.filter((c) => c.id !== id));
        };

        const validNames = personAName.trim() && personBName.trim()
          && norm(personAName) !== norm(personBName);

        const validCards = cards.every((c) =>
          c.label.trim() && /^\d{4}$/.test(String(c.last4 || '').trim())
        );

        const finishConfig = async () => {
          const hid = householdId || generateId();
          const cfg = buildConfig(hid, personAName, personBName, cards);
          setSaveError('');
          try {
            await saveHouseholdToCloud(db, cfg, uid, { isCreate: true });
            saveAppConfig(uid, cfg);
            setHouseholdId(hid);
            onComplete(cfg);
            setStep('select');
          } catch (e) {
            console.error(e);
            setSaveError('Erro ao salvar família na nuvem. Verifique a conexão e tente novamente.');
          }
        };

        const handleJoinContinue = async () => {
          const code = joinCode.trim();
          if (!code) return;
          setJoinLoading(true);
          setJoinError('');
          try {
            const cfg = await joinHousehold(db, uid, code);
            saveAppConfig(uid, cfg);
            setHouseholdId(code);
            setPersonAName(nameA(cfg));
            setPersonBName(nameB(cfg));
            setCards(cfg.cards);
            onComplete(cfg);
            setStep('select');
          } catch (e) {
            console.error(e);
            if (e.message === 'NOT_FOUND') {
              setJoinError('Código não encontrado. Confira se copiou certo e se a família já foi criada.');
            } else if (e.message === 'FULL') {
              setJoinError('Esta família já tem 2 membros. Peça ao criador para excluir e recriar, ou use outra conta.');
            } else {
              setJoinError('Erro ao entrar na família. Tente novamente.');
            }
          } finally {
            setJoinLoading(false);
          }
        };

        const copyCode = async () => {
          try {
            await navigator.clipboard.writeText(householdId || existingConfig?.householdId || '');
            setCopied(true);
            setTimeout(() => setCopied(false), 2000);
          } catch {}
        };

        if (step === 'welcome') {
          return (
            <div className="min-h-screen flex flex-col justify-center items-center p-6 bg-slate-50 dark:bg-slate-900">
              <h1 className="text-4xl font-bold mb-2 text-slate-800 dark:text-white">Meu Acerto</h1>
              <p className="text-lg text-slate-600 dark:text-slate-400 mb-2 text-center">Configure seu acerto financeiro a dois</p>
              {userEmail && <p className="text-xs text-slate-500 mb-6">{userEmail}</p>}
              {!userEmail && isGuest && <p className="text-xs text-slate-500 mb-6">Acesso convidado</p>}
              <div className="space-y-3 w-full max-w-xs">
                {!isGuest && (
                  <button onClick={() => { setMode('create'); setStep('names'); }}
                    className="w-full py-3 rounded-xl bg-indigo-600 text-white font-semibold shadow-lg hover:brightness-110">
                    Criar nova família
                  </button>
                )}
                {!isGuest && (
                  <button onClick={() => { setMode('join'); setStep('join'); }}
                    className="w-full py-3 rounded-xl bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 text-slate-700 dark:text-slate-200 font-semibold hover:bg-slate-50 dark:hover:bg-slate-700">
                    Entrar com código da família
                  </button>
                )}
                {isGuest && (
                  <p className="text-sm text-slate-500 text-center">Use o código na tela inicial para entrar na família.</p>
                )}
              </div>
              {onSignOut && (
                <button onClick={onSignOut} className="mt-8 text-sm text-slate-500 hover:text-slate-700 dark:hover:text-slate-300">
                  Sair da conta
                </button>
              )}
            </div>
          );
        }

        if (step === 'join') {
          return (
            <div className="min-h-screen flex flex-col justify-center items-center p-6 bg-slate-50 dark:bg-slate-900">
              <h1 className="text-2xl font-bold mb-2 text-slate-800 dark:text-white">Código da família</h1>
              <p className="text-sm text-slate-600 dark:text-slate-400 mb-6 text-center max-w-sm">
                Cole o código que a outra pessoa copiou na configuração inicial.
              </p>
              <input className={ui.input + ' max-w-sm mb-4'} placeholder="UUID da família"
                value={joinCode} onChange={(e) => setJoinCode(e.target.value)} />
              {joinError && <p className="text-sm text-red-500 mb-4 text-center max-w-sm">{joinError}</p>}
              <button disabled={!joinCode.trim() || joinLoading} onClick={handleJoinContinue}
                className="w-full max-w-sm py-3 rounded-xl bg-indigo-600 text-white font-semibold disabled:opacity-50">
                {joinLoading ? 'Buscando família...' : 'Continuar'}
              </button>
              <button onClick={() => setStep('welcome')} className="mt-4 text-sm text-slate-500 hover:text-slate-700">Voltar</button>
            </div>
          );
        }

        if (step === 'names') {
          const familyCode = householdId || existingConfig?.householdId || '';
          const backFromSettings = existingConfig?.setupComplete;
          return (
            <div className="min-h-screen relative flex flex-col justify-center items-center p-6 bg-slate-50 dark:bg-slate-900">
              <BackIconButton
                onClick={() => setStep(backFromSettings ? 'select' : (mode === 'join' ? 'join' : 'welcome'))}
                className="absolute top-4 left-4"
              />
              {backFromSettings && onSignOut && (
                <LogoutIconButton onClick={onSignOut} className="absolute top-4 right-4" />
              )}
              <h1 className="text-2xl font-bold mb-2 text-slate-800 dark:text-white">Nomes</h1>
              <p className="text-sm text-slate-600 dark:text-slate-400 mb-6 text-center">Quem são as duas pessoas?</p>
              <div className="w-full max-w-sm space-y-4">
                {backFromSettings && familyCode && (
                  <FamilyCodeBlock code={familyCode} copied={copied} onCopy={copyCode} compact />
                )}
                <div>
                  <label className={ui.label}>Pessoa 1 (paga faturas de cartão)</label>
                  <input className={ui.input} placeholder="Ex: João" value={personAName} onChange={(e) => setPersonAName(e.target.value)} />
                </div>
                <div>
                  <label className={ui.label}>Pessoa 2</label>
                  <input className={ui.input} placeholder="Ex: Maria" value={personBName} onChange={(e) => setPersonBName(e.target.value)} />
                </div>
                <button disabled={!validNames} onClick={() => setStep('cards')}
                  className="w-full py-3 rounded-xl bg-indigo-600 text-white font-semibold disabled:opacity-50">
                  Continuar
                </button>
              </div>
            </div>
          );
        }

        if (step === 'cards') {
          const backFromSettings = existingConfig?.setupComplete;
          return (
            <div className="min-h-screen relative flex flex-col p-6 bg-slate-50 dark:bg-slate-900 max-w-lg mx-auto">
              <BackIconButton onClick={() => setStep('names')} className="absolute top-4 left-4" />
              {backFromSettings && onSignOut && (
                <LogoutIconButton onClick={onSignOut} className="absolute top-4 right-4" />
              )}
              <h1 className="text-2xl font-bold mb-2 mt-8 text-slate-800 dark:text-white">Cartões</h1>
              <p className="text-sm text-slate-600 dark:text-slate-400 mb-2">Adicione cartões manualmente ou pule e cadastre importando a fatura depois.</p>
              <p className="text-xs text-slate-500 dark:text-slate-400 mb-4">Na importação, os cartões são detectados automaticamente pelo arquivo do banco.</p>
              <div className="space-y-3 flex-1 overflow-y-auto mb-4">
                {cards.map((c) => (
                  <div key={c.id} className="bg-white dark:bg-slate-800 p-3 rounded-xl space-y-2 shadow-sm">
                    <input className={ui.input} placeholder="Nome do cartão" value={c.label}
                      onChange={(e) => updateCard(c.id, 'label', e.target.value)} />
                    <div className="grid grid-cols-2 gap-2">
                      <input className={ui.input} placeholder="Final 1234" maxLength={4} value={c.last4}
                        onChange={(e) => updateCard(c.id, 'last4', e.target.value.replace(/\D/g, '').slice(0, 4))} />
                      <select className={ui.select} value={c.owner} onChange={(e) => updateCard(c.id, 'owner', e.target.value)}>
                        <option value="personA">{personAName || 'Pessoa 1'}</option>
                        <option value="personB">{personBName || 'Pessoa 2'}</option>
                        <option value="both">Ambos</option>
                      </select>
                    </div>
                    <select className={ui.select} value={c.bankId || ''} onChange={(e) => updateCard(c.id, 'bankId', e.target.value)}>
                      <option value="">Banco (opcional)</option>
                      {BANKS.map((b) => (
                        <option key={b.id} value={b.id}>{b.name}{!b.enabled ? ' (em breve)' : ''}</option>
                      ))}
                    </select>
                    <button onClick={() => removeCard(c.id)} className="text-xs text-red-500 hover:text-red-700">Remover</button>
                  </div>
                ))}
                <button onClick={addCard} className="w-full py-2 rounded-xl border-2 border-dashed border-slate-300 dark:border-slate-600 text-slate-600 dark:text-slate-400 hover:border-indigo-400">
                  + Adicionar cartão
                </button>
              </div>
              <div className="flex gap-2">
                <button type="button" onClick={() => {
                  if (mode === 'create' && !householdId) setHouseholdId(generateId());
                  setStep('household');
                }} className="flex-1 py-3 rounded-xl border border-slate-300 dark:border-slate-600 text-slate-600 dark:text-slate-300 font-semibold hover:bg-slate-100 dark:hover:bg-slate-800">
                  Pular
                </button>
                <button disabled={cards.length > 0 && !validCards} onClick={() => {
                  if (mode === 'create' && !householdId) setHouseholdId(generateId());
                  setStep('household');
                }} className="flex-1 py-3 rounded-xl bg-indigo-600 text-white font-semibold disabled:opacity-50">
                  Continuar
                </button>
              </div>
            </div>
          );
        }

        if (step === 'household') {
          return (
            <div className="min-h-screen flex flex-col justify-center items-center p-6 bg-slate-50 dark:bg-slate-900">
              <h1 className="text-2xl font-bold mb-2 text-slate-800 dark:text-white">Código da família</h1>
              <p className="text-sm text-slate-600 dark:text-slate-400 mb-4 text-center max-w-sm">
                Compartilhe este código com a outra pessoa para sincronizar os lançamentos.
              </p>
              <div className="bg-white dark:bg-slate-800 p-4 rounded-xl max-w-sm w-full mb-4 break-all text-xs font-mono text-slate-700 dark:text-slate-200">
                {householdId}
              </div>
              <button onClick={copyCode} className="w-full max-w-sm py-2 rounded-xl bg-slate-200 dark:bg-slate-700 text-slate-700 dark:text-slate-200 font-medium mb-4">
                {copied ? 'Copiado!' : 'Copiar código'}
              </button>
              <button onClick={finishConfig} className="w-full max-w-sm py-3 rounded-xl bg-indigo-600 text-white font-semibold">
                Continuar
              </button>
              {saveError && <p className="text-sm text-red-500 mt-3 text-center max-w-sm">{saveError}</p>}
            </div>
          );
        }

        // step === 'select'
        const cfg = existingConfig?.setupComplete ? existingConfig : loadAppConfig(uid);
        return (
          <div className="min-h-screen relative flex flex-col justify-center items-center p-6 bg-slate-50 dark:bg-slate-900">
            {onSignOut && (
              <LogoutIconButton onClick={onSignOut} className="absolute top-4 right-4" />
            )}
            <h1 className="text-4xl font-bold mb-2 text-slate-800 dark:text-white">Meu Acerto</h1>
            <p className="text-lg text-slate-600 dark:text-slate-400 mb-8">Quem está a usar?</p>
            <div className="space-y-4 w-full max-w-xs">
              <button onClick={() => onComplete(cfg, 'personA')}
                className="w-full py-3 rounded-xl text-white font-semibold shadow-lg hover:brightness-110 bg-indigo-600">
                {nameA(cfg)}
              </button>
              <button onClick={() => onComplete(cfg, 'personB')}
                className="w-full py-3 rounded-xl text-white font-semibold shadow-lg hover:brightness-110 bg-pink-600">
                {nameB(cfg)}
              </button>
            </div>
            <button onClick={() => setStep('names')} className="mt-8 text-sm text-slate-500 hover:text-slate-700 dark:hover:text-slate-300">
              Configurações
            </button>
          </div>
        );
      };

      const SettingsModal = ({ isOpen, onClose, config, onSave, db, uid, isOwner, onDeleteHousehold, onSignOut }) => {
        const [personAName, setPersonAName] = useState(nameA(config));
        const [personBName, setPersonBName] = useState(nameB(config));
        const [cards, setCards] = useState(config?.cards || []);
        const [deleteConfirm, setDeleteConfirm] = useState('');
        const [deleting, setDeleting] = useState(false);
        const [codeCopied, setCodeCopied] = useState(false);

        useEffect(() => {
          if (isOpen && config) {
            setPersonAName(nameA(config));
            setPersonBName(nameB(config));
            setCards(config.cards || []);
            setDeleteConfirm('');
            setCodeCopied(false);
          }
        }, [isOpen, config]);

        if (!isOpen) return null;

        const addCard = () => setCards((p) => [...p, { id: generateId(), label: '', last4: '', owner: 'personA', bankId: '' }]);
        const updateCard = (id, field, value) => setCards((p) => p.map((c) => c.id === id ? { ...c, [field]: value } : c));
        const removeCard = (id) => setCards((p) => p.filter((c) => c.id !== id));

        const copyFamilyCode = async () => {
          try {
            await navigator.clipboard.writeText(config.householdId);
            setCodeCopied(true);
            setTimeout(() => setCodeCopied(false), 2000);
          } catch {}
        };

        const handleSave = async () => {
          const updated = buildConfig(config.householdId, personAName, personBName, cards);
          try {
            await saveHouseholdToCloud(db, updated, uid);
            saveAppConfig(uid, updated);
            onSave(updated);
            onClose();
          } catch (e) {
            console.error(e);
            alert('Erro ao salvar configurações na nuvem. Tente novamente.');
          }
        };

        const handleDeleteHousehold = async () => {
          if (deleteConfirm !== 'EXCLUIR') return;
          setDeleting(true);
          try {
            await onDeleteHousehold();
            onClose();
          } catch (e) {
            console.error(e);
            alert('Erro ao excluir família. Tente novamente.');
          } finally {
            setDeleting(false);
          }
        };

        return (
          <Modal isOpen={isOpen} onClose={onClose}>
            <h3 className="text-lg font-semibold mb-4">Configurações</h3>
            <div className="space-y-3 max-h-[60vh] overflow-y-auto">
              {config?.householdId && (
                <FamilyCodeBlock code={config.householdId} copied={codeCopied} onCopy={copyFamilyCode} />
              )}
              <div>
                <label className={ui.label}>Pessoa 1</label>
                <input className={ui.input} value={personAName} onChange={(e) => setPersonAName(e.target.value)} />
              </div>
              <div>
                <label className={ui.label}>Pessoa 2</label>
                <input className={ui.input} value={personBName} onChange={(e) => setPersonBName(e.target.value)} />
              </div>
              <p className="text-sm font-medium mt-2">Cartões</p>
              {cards.map((c) => (
                <div key={c.id} className="border border-slate-200 dark:border-slate-700 p-2 rounded-lg space-y-2">
                  <input className={ui.input} placeholder="Nome" value={c.label} onChange={(e) => updateCard(c.id, 'label', e.target.value)} />
                  <div className="grid grid-cols-2 gap-2">
                    <input className={ui.input} placeholder="Final" maxLength={4} value={c.last4}
                      onChange={(e) => updateCard(c.id, 'last4', e.target.value.replace(/\D/g, '').slice(0, 4))} />
                    <select className={ui.select} value={c.owner} onChange={(e) => updateCard(c.id, 'owner', e.target.value)}>
                      <option value="personA">{personAName || 'Pessoa 1'}</option>
                      <option value="personB">{personBName || 'Pessoa 2'}</option>
                      <option value="both">Ambos</option>
                    </select>
                  </div>
                  <select className={ui.select} value={c.bankId || ''} onChange={(e) => updateCard(c.id, 'bankId', e.target.value)}>
                    <option value="">Banco</option>
                    {BANKS.map((b) => (
                      <option key={b.id} value={b.id}>{b.name}</option>
                    ))}
                  </select>
                  <button onClick={() => removeCard(c.id)} className="text-xs text-red-500">Remover</button>
                </div>
              ))}
              <button onClick={addCard} className="text-sm text-indigo-600">+ Adicionar cartão</button>

              {isOwner && (
                <div className="mt-4 pt-4 border-t border-slate-200 dark:border-slate-700">
                  <p className="text-sm font-medium text-red-600 dark:text-red-400 mb-2">Zona de perigo</p>
                  <p className="text-xs text-slate-500 mb-2">
                    Excluir a família apaga todos os lançamentos e parcelas. O outro membro também perderá acesso.
                  </p>
                  <input className={ui.input} placeholder='Digite EXCLUIR para confirmar'
                    value={deleteConfirm} onChange={(e) => setDeleteConfirm(e.target.value)} />
                  <button disabled={deleteConfirm !== 'EXCLUIR' || deleting} onClick={handleDeleteHousehold}
                    className="mt-2 w-full py-2 rounded-xl bg-red-600 text-white text-sm font-semibold disabled:opacity-50">
                    {deleting ? 'Excluindo...' : 'Excluir família'}
                  </button>
                </div>
              )}

              {onSignOut && (
                <button onClick={onSignOut} className="mt-2 w-full py-2 rounded-xl text-sm text-slate-500 hover:text-slate-700 dark:hover:text-slate-300">
                  Sair da conta
                </button>
              )}
            </div>
            <div className="mt-4 flex justify-end gap-2">
              <button className={ui.btnGhost} onClick={onClose}>Cancelar</button>
              <button className={ui.btnPrimary} onClick={handleSave}>Salvar</button>
            </div>
          </Modal>
        );
      };

      /* ========= Dashboard ========= */
      const Dashboard = ({ activePanel, config, onLogout, onConfigChange, db, householdId, uid, isOwner, onDeleteHousehold, onSignOut }) => {
        const [expenses, setExpenses] = useState([]);
        const [installmentPlans, setInstallmentPlans] = useState([]);
        const [monthsFromDb, setMonthsFromDb] = useState([]);
        const [isSettingsOpen, setIsSettingsOpen] = useState(false);

        const [currentMonth, setCurrentMonth] = useState(() => currentMonthKey());

        const [filterType, setFilterType] = useState('Todos');
        const [scope, setScope] = useState('geral');

        const [isAddOpen, setIsAddOpen] = useState(false);
        const [isImportOpen, setIsImportOpen] = useState(false);
        const [isClearOpen, setIsClearOpen] = useState(false);
        const [isDelOpen, setDelOpen] = useState(false);

        const [delTarget, setDelTarget] = useState(null);
        const [deleting, setDeleting] = useState(false);
        const [importedExpenses, setImportedExpenses] = useState([]);
        const [importDiscoveredCards, setImportDiscoveredCards] = useState([]);
        const [importBankId, setImportBankId] = useState('');
        const [isImporting, setIsImporting] = useState(false);
        const [isBankSelectOpen, setIsBankSelectOpen] = useState(false);
        const [importError, setImportError] = useState('');
        const [cardBankFilter, setCardBankFilter] = useState('todos');
        const pendingImportBankRef = useRef('');
        const fileInputRef = useRef(null);

        // Ensure refs are initialized
        const valorRef = useRef(null);

        const formatBRLInput = (digits, negative=false) => {
          const n = (Number(digits) || 0) / 100;
          const fmt = n.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
          return negative ? `-${fmt}` : fmt;
        };
        const handleValorChange = (e) => {
          const raw = e.target.value;
          const negative = raw.trim().startsWith('-');
          const digits = raw.replace(/\D/g, '');
          if (!digits) { setFValor(negative ? '-' : ''); return; }
          setFValor(formatBRLInput(digits, negative));
        };

        const [fDesc, setFDesc] = useState('');
        const [fValor, setFValor] = useState('');
        const [fData, setFData] = useState(() => new Date().toLocaleDateString('pt-PT', { timeZone: 'UTC' }));
        const [fTipo, setFTipo] = useState('Cartão');
        const [fSplit, setFSplit] = useState('Dividido');
        const [fFonte, setFFonte] = useState(() => defaultCardForPanel(activePanel, config));
        const [fParcela, setFParcela] = useState('');
        const [salvando, setSalvando] = useState(false);
        const [editingId, setEditingId] = useState(null);

        const fb = window.FirebaseLib;
        if (!fb) return null;

        const { collection, doc, addDoc, updateDoc, deleteDoc, onSnapshot, runTransaction, writeBatch, query, where } = fb;

        const theme = activePanel === 'personB'
          ? { text:'text-pink-600 dark:text-pink-400', bg:'bg-pink-600', hover:'hover:bg-pink-700' }
          : { text:'text-indigo-600 dark:text-indigo-400', bg:'bg-indigo-600', hover:'hover:bg-indigo-700' };

        const displayName = activePanel === 'personB' ? nameB(config) : nameA(config);

        // Listeners
        useEffect(() => {
          if (!db || !fb || !householdId) return;
          const plansRef = collection(db, 'installmentPlans');
          const q = query(plansRef, where('householdId', '==', householdId));
          const unsub = onSnapshot(q, (s) => setInstallmentPlans(s.docs.map(d => ({ id: d.id, ...d.data() }))));
          return () => unsub();
        }, [db, householdId]);

        useEffect(() => {
          if (!db || !fb || !householdId) return;
          const expRef = collection(db, 'expenses');
          const q = query(expRef, where('householdId', '==', householdId));
          const unsub = onSnapshot(q, (s) => {
             const set = new Set();
             s.forEach(d => { const mk = d.data().monthKey; if(mk) set.add(mk); });
             setMonthsFromDb(Array.from(set).sort());
          });
          return () => unsub();
        }, [db, householdId]);

        useEffect(() => {
          if (!db || !currentMonth || !fb || !householdId) return;
          const expRef = collection(db, 'expenses');
          const q = query(expRef, where('householdId', '==', householdId), where('monthKey', '==', currentMonth));
          const unsub = onSnapshot(q, (s) => {
              setExpenses(s.docs.map(d => ({ id: d.id, ...d.data() })));
          });
          return () => unsub();
        }, [db, currentMonth, householdId]);

        // Geração Parcelas
        useEffect(() => {
          if (!installmentPlans.length || !db || !fb || !householdId) return;
          const generate = async () => {
             const expCol = collection(db, 'expenses');
             const batch = writeBatch(db);
             let hasWrites = false;
             for (const plan of installmentPlans) {
                 if (!plan.startDate || !plan.numberOfInstallments || !plan.totalAmount) continue;
                 const [dd, mm, yyyy] = String(plan.startDate).split('/').map(Number);
                 const start = new Date(yyyy, mm - 1, dd, 12);
                 const deletedSet = new Set(plan.deletedParcels || []);
                 const per = round2(plan.totalAmount / plan.numberOfInstallments);
                 const last = round2(plan.totalAmount - per * (plan.numberOfInstallments - 1));
                 for (let i = 0; i < plan.numberOfInstallments; i++) {
                     const d = new Date(start.getFullYear(), start.getMonth() + i, start.getDate(), 12);
                     const parcelaKey = `${i+1}/${plan.numberOfInstallments}`;
                     if (deletedSet.has(parcelaKey)) continue;
                     const mk = monthKeyFromDateObj(d);
                     const dateStr = d.toLocaleDateString('pt-PT', { timeZone: 'UTC' });
                     const amount = (i+1) === plan.numberOfInstallments ? last : per;
                     const qDup = query(expCol,
                       where('householdId','==', householdId),
                       where('installmentPlanId','==', plan.id),
                       where('parcela','==', parcelaKey),
                       where('monthKey','==', mk));
                     const snap = await window.FirebaseLib.getDocs(qDup);
                     if (snap.empty) {
                         const newRef = doc(expCol);
                         batch.set(newRef, {
                             householdId,
                             installmentPlanId: plan.id, description: plan.description, amount,
                             date: dateStr, parcela: parcelaKey, split: plan.split || 'Dividido',
                             type: plan.type || 'Cartão', paymentSource: plan.paymentSource || 'Cartão',
                             paidBy: 'Cartão', monthKey: mk,
                             isInstallment: true,
                             installmentCurrent: i+1,
                             installmentTotal: plan.numberOfInstallments
                         });
                         hasWrites = true;
                     }
                 }
             }
             if (hasWrites) await batch.commit();
          };
          generate();
        }, [installmentPlans, db, householdId]);

        /* ==== Derivados ==== */
        const availableMonths = useMemo(() => {
          const set = new Set(monthsFromDb);
          set.add(currentMonth);
          return Array.from(set).sort();
        }, [monthsFromDb, currentMonth]);

        const expensesForScope = useMemo(() => {
          let base = expenses;
          if (scope === 'cartao') base = base.filter(e => e.type === 'Cartão');
          else if (scope === 'pixboleto') base = base.filter(e => ['Pix', 'Boleto', 'Ajuste'].includes(e.type));
          return base;
        }, [expenses, scope]);

        // --- FILTERED LIST (Agora usa visibleExpensesForScope) ---

        const visibleExpensesForScope = useMemo(() => {
          return expensesForScope.filter(e => {
            if (!e.panelUser) return true;
            return e.panelUser === activePanel;
          });
        }, [expensesForScope, activePanel]);

        useEffect(() => {
          if (filterType !== 'Cartão') setCardBankFilter('todos');
        }, [filterType]);

        const bankFiltersAvailable = useMemo(
          () => banksUsedInMonth(expenses, config.cards),
          [expenses, config.cards]
        );

        const filteredList = useMemo(() => {
          let base = visibleExpensesForScope;
          if (filterType !== 'Todos') {
              if (filterType === 'Parcelado') {
                  base = base.filter(e => e.isInstallment || (e.installmentTotal && e.installmentTotal > 1));
              } else {
                  base = base.filter(e => e.type === filterType);
              }
          }
          if (filterType === 'Cartão' && cardBankFilter !== 'todos') {
            base = base.filter((e) => getExpenseBankId(e, config.cards) === cardBankFilter);
          }
          return base.sort((a,b) => {
              const da = ptDateToDateObj(a.date);
              const db = ptDateToDateObj(b.date);
              return (da && db) ? da - db : 0;
          });
        }, [visibleExpensesForScope, filterType, cardBankFilter, config.cards]);

        // --- TOTAIS (ATUALIZADO V2) ---
        const { partG, partT, gPaid, tPaid } = useMemo(() => {
          let pG = 0, pT = 0, paidG = 0, paidT = 0;

          for (const e of expensesForScope) {
            const val = Number(e.amount || 0);

            if (e.split === 'Dividido') {
              pG += val / 2;
              pT += val / 2;
            } else if (isSplitPersonA(e.split, config)) {
              pG += val;
            } else if (isSplitPersonB(e.split, config)) {
              pT += val;
            }

            if (e.type === 'Cartão') {
              paidG += val;
            } else {
              if (isPaidByPersonA(e.paidBy, config)) paidG += val;
              else if (isPaidByPersonB(e.paidBy, config)) paidT += val;
            }
          }

          return {
            partG: round2(pG),
            partT: round2(pT),
            gPaid: round2(paidG),
            tPaid: round2(paidT),
          };
        }, [expensesForScope, config]);

        const difGastos = round2(partG - partT);
        const valorDevolverSePagarTudo = activePanel === 'personA'
          ? round2(gPaid - partG)
          : round2(tPaid - partT);

        const saldoDevedor = useMemo(() => {
          let pG = 0;
          let paidG = 0;

          for (const e of expensesForScope) {
            const val = Number(e.amount || 0);

            if (e.split === 'Dividido') {
              pG += val / 2;
            } else if (isSplitPersonA(e.split, config)) {
              pG += val;
            }

            if (e.type === "Cartão") {
              paidG += val;
            } else {
              if (isPaidByPersonA(e.paidBy, config)) {
                paidG += val;
              }
            }
          }

          return round2(paidG - pG);
        }, [expensesForScope, config]);

        const cardTotals = useMemo(() => {
          let tot = 0;
          const perCard = {};
          const cardsShown = (config.cards || []).filter((c) =>
            cardBankFilter === 'todos' || c.bankId === cardBankFilter
          );
          cardsShown.forEach((c) => { perCard[c.id] = 0; });
          for (const e of expenses) {
              if (e.type !== 'Cartão') continue;
              const eb = getExpenseBankId(e, config.cards);
              if (cardBankFilter !== 'todos' && eb !== cardBankFilter) continue;
              const val = Number(e.amount||0);
              tot += val;
              const card = findCardByPaymentSource(e.paymentSource, config.cards);
              if (card && (cardBankFilter === 'todos' || card.bankId === cardBankFilter)) {
                perCard[card.id] = (perCard[card.id] || 0) + val;
              }
          }
          return { grandTotal: round2(tot), perCard, cardsShown };
        }, [expenses, config.cards, cardBankFilter]);

        // Valor que "some" da fatura no mês seguinte (parcelas que terminam neste mês)
        const freedNextInvoice = useMemo(() => {
          let total = 0;
          let totalG = 0;
          let totalT = 0;
          let count = 0;
          const seen = new Set();

          for (const e of expenses) {
            const totalI = Number(e.installmentTotal || 0);
            const currentI = Number(e.installmentCurrent || 0);

            // Só considera lançamentos que são parcelas e estão na ÚLTIMA
            if (!totalI || !currentI) continue;
            if (totalI <= 1) continue;
            if (currentI !== totalI) continue; // apenas última

            const key = 
              e.installmentPlanId || 
              `${norm(e.description)}|${norm(e.paymentSource)}|${totalI}`;

            if (seen.has(key)) continue;
            seen.add(key);

            const val = Number(e.amount || 0);
            total += val;
            count++;

            // Que parte é do Gui e da Thais
            if (e.type === "Cartão") {
              const owner = ownerFromPaymentSource(e.paymentSource, config.cards);
              if (owner === "personA") {
                totalG += val;
              } else if (owner === "personB") {
                totalT += val;
              } else if (owner === "both") {
                totalG += val / 2;
                totalT += val / 2;
              }
            } else {
              if (isPaidByPersonA(e.paidBy, config)) totalG += val;
              else if (isPaidByPersonB(e.paidBy, config)) totalT += val;
            }
          }

          return {
            total: round2(total),
            count,
            totalG: round2(totalG),
            totalT: round2(totalT),
          };
        }, [expenses, config]);

        // --- HELPER DE ESTILO DE PARCELA ---
        const isLastInstallment = (e) => {
          const total = Number(e.installmentTotal || 0);
          const current = Number(e.installmentCurrent || 0);

          if (total > 1 && current === total) return true;

          // fallback: se vier só como string "3/3"
          if (typeof e.parcela === "string") {
            const m = e.parcela.match(/^(\d+)\s*\/\s*(\d+)$/);
            if (m) {
              const c = Number(m[1]);
              const t = Number(m[2]);
              return t > 1 && c === t;
            }
          }
          return false;
        };

        /* ==== Ações ==== */

        // --- NOVA FUNÇÃO DE FECHAR O MODAL E LIMPAR ESTADO ---
        const closeAddModal = () => {
            setIsAddOpen(false);
            setEditingId(null);
            setFDesc('');
            setFValor('');
            setFParcela('');
        };

        // --- salvarLancamento (COM SUPORTE A panelUser) ---
        const salvarLancamento = async () => {
          const val = parseMoney(fValor);

          // Validação básica
          if (!fDesc || !Number.isFinite(val)) {
              console.warn('Dados inválidos ao salvar lançamento');
              return;
          }

          // ------------------------------------------------------------------
          // [ALTERADO] Prioriza o mês selecionado (currentMonth) em vez da data
          // ------------------------------------------------------------------
          const mk = currentMonth || monthKeyFromPtDate(fData) || currentMonthKey();
          
          setSalvando(true);

          const expCol = collection(db, 'expenses');

          let panelUserVal = activePanel;

          let expenseBankId = null;
          if (fTipo === 'Cartão') {
              const card = findCardByPaymentSource(fFonte, config.cards);
              panelUserVal = panelUserFromCard(card);
              expenseBankId = card?.bankId || null;
          } else {
              panelUserVal = activePanel;
          }

          const instObj = parseInstallmentFromCell(fParcela);

          const payload = {
              householdId,
              description: fDesc,
              amount: val,
              date: fData,
              split: fTipo === 'Ajuste' ? nameA(config) : fSplit,
              type: fTipo,
              paymentSource: fTipo === 'Cartão' ? fFonte : fTipo,
              paidBy: fTipo === 'Cartão' ? 'Cartão' : (fTipo === 'Ajuste' ? 'personB' : activePanel),
              monthKey: mk,
              parcela: instObj.isInstallment ? instObj.info : null,
              isInstallment: instObj.isInstallment,
              installmentCurrent: instObj.current,
              installmentTotal: instObj.total,
              panelUser: panelUserVal,
          };
          if (expenseBankId) payload.bankId = expenseBankId;

          // Remove campos undefined
          Object.keys(payload).forEach((k) => {
              if (payload[k] === undefined) delete payload[k];
          });

          try {
              if (editingId) {
                  // ⚠️ NÃO alterar o mês da fatura ao editar
                  delete payload.monthKey;

                  // ⚠️ Usa ref direta com db/collection/id para evitar qualquer zica
                  const ref = doc(db, 'expenses', editingId);
                  await updateDoc(ref, payload);
              } else {
                  await addDoc(expCol, payload);
              }

              // Limpa e fecha modal
              closeAddModal();
          } catch (e) {
              console.error('Erro ao salvar lançamento:', e);
          }

          setSalvando(false);
        };

        // --- NOVA FUNÇÃO DE ABRIR MODAL PARA EDIÇÃO ---
        const openEditModal = (e) => {
            setEditingId(e.id);
            setFDesc(e.description || '');
            const valNum = Number(e.amount || 0);
            setFValor(valNum.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 }));
            setFData(e.date || new Date().toLocaleDateString('pt-PT', { timeZone: 'UTC' }));
            setFTipo(e.type || 'Cartão');
            setFSplit(e.split || 'Dividido');
            setFFonte(e.paymentSource || defaultCardForPanel(activePanel, config));
            setFParcela(e.parcela || '');
            setIsAddOpen(true);
        };

        const makeDedupeKey = (e) => 
          `${norm(e.description)}|${e.amount}|${e.date}|${e.parcela||''}|${norm(e.type)}|${norm(e.paymentSource)}|${e.monthKey}`;

        const openImportFlow = () => {
          setImportError('');
          setIsBankSelectOpen(true);
        };

        const selectBankForImport = (bankId) => {
          const bank = getBankById(bankId);
          if (!bank?.enabled) return;
          pendingImportBankRef.current = bankId;
          setImportError('');
          setIsBankSelectOpen(false);
          fileInputRef.current?.click();
        };

        const handleFileChange = async (e) => {
          const file = e.target.files?.[0];
          const bankId = pendingImportBankRef.current;
          pendingImportBankRef.current = '';
          if (!file) return;
          if (!bankId) {
            setImportError('Selecione o banco antes de importar.');
            if (fileInputRef.current) fileInputRef.current.value = '';
            return;
          }
          setIsImporting(true);
          setImportError('');
          try {
              const rows = await readSpreadsheetFile(file);
              if (!rows.length) throw new Error('Vazio');

              const parser = importParsers[bankId];
              if (!parser) throw new Error('IMPORT_NOT_READY:Banco');

              const result = parser(rows, config, householdId, currentMonth);
              setImportedExpenses(result.expenses || []);
              setImportDiscoveredCards(result.discovered || []);
              setImportBankId(result.bankId || bankId);
              setIsImportOpen(true);
          } catch (err) {
              console.error(err);
              const msg = String(err.message || err);
              if (msg.startsWith('IMPORT_NOT_READY:')) {
                setImportError(`Importação para ${msg.split(':')[1]} em breve.`);
              } else {
                setImportError('Erro ao ler o arquivo. Verifique o formato da fatura.');
              }
          }
          setIsImporting(false);
          if (fileInputRef.current) fileInputRef.current.value = '';
        };

        const confirmImport = async () => {
          if (!importedExpenses.length) return;

          setIsImporting(true);

          try {
            const bankId = importBankId || 'c6';
            if (importDiscoveredCards.length > 0) {
              const mergedCards = mergeDiscoveredCards(config.cards, importDiscoveredCards, bankId);
              const updatedConfig = buildConfig(config.householdId, nameA(config), nameB(config), mergedCards);
              await saveHouseholdToCloud(db, updatedConfig, uid);
              saveAppConfig(uid, updatedConfig);
              onConfigChange(updatedConfig);
            }

            const monthsInFile = [...new Set(importedExpenses.map(e => e.monthKey))];
            const expRef = collection(db, 'expenses');
            const existingKeys = new Set();

            await Promise.all(monthsInFile.map(async (mk) => {
                const q = query(expRef, where('householdId', '==', householdId), where('monthKey', '==', mk));
                const snap = await window.FirebaseLib.getDocs(q);
                snap.forEach((d) => {
                    existingKeys.add(makeDedupeKey(d.data()));
                });
            }));

            const batch = writeBatch(db);
            let count = 0;
            importedExpenses.forEach((imp) => {
                const key = makeDedupeKey(imp);
                if (!existingKeys.has(key)) {
                    const toSave = { ...imp };
                    if (imp.installmentPlanId) toSave.installmentPlanId = imp.installmentPlanId;
                    Object.keys(toSave).forEach((k) => toSave[k] === undefined && delete toSave[k]);
                    batch.set(doc(expRef), toSave);
                    count++;
                }
            });
            if (count > 0) await batch.commit();

            setIsImportOpen(false);
            setImportedExpenses([]);
            setImportDiscoveredCards([]);
            setImportBankId('');
          } catch (err) {
            console.error(err);
            setImportError('Erro ao salvar importação. Tente novamente.');
          }
          setIsImporting(false);
        };

        const doDelete = async () => {
          if (!delTarget) return;
          setDeleting(true);
          const expRef = doc(db, 'expenses', delTarget.id);
          try {
               if (delTarget.installmentPlanId && delTarget.parcela) {
                   const planRef = doc(db, 'installmentPlans', delTarget.installmentPlanId);
                   await runTransaction(db, async (t) => {
                       const planSnap = await t.get(planRef);
                       if (planSnap.exists()) {
                           const data = planSnap.data();
                           const deleted = data.deletedParcels || [];
                           t.update(planRef, { deletedParcels: [...deleted, delTarget.parcela] });
                       }
                       t.delete(expRef);
                   });
               } else { await deleteDoc(expRef); }
               setDelTarget(null);
               setDelOpen(false);
          } catch(e) { console.error(e); }
          setDeleting(false);
        };

        // --- LIMPAR APENAS MÊS ATUAL (COM SUPORTE A panelUser) ---
        const clearCurrentMonth = async () => {
          try {
              const expRef = collection(db, 'expenses');
              const q = query(
                  expRef,
                  where('householdId', '==', householdId),
                  where('monthKey','==', currentMonth),
                  where('panelUser', '==', activePanel)
              );
              const snap = await window.FirebaseLib.getDocs(q);
              const batch = writeBatch(db);
              snap.forEach(d => batch.delete(d.ref));
              await batch.commit();
              setIsClearOpen(false);
          } catch(e) { console.error(e); }
        };

        const clearAll = async () => {
           try {
               const q = query(collection(db, 'expenses'), where('householdId', '==', householdId));
               const snap = await window.FirebaseLib.getDocs(q);
               const batch = writeBatch(db);
               snap.forEach(d => batch.delete(d.ref));
               await batch.commit();
               setIsClearOpen(false);
           } catch(e) { console.error(e); }
        };

        // Abas visíveis conforme o usuário
        const tabsForUser =
          activePanel === 'personB'
            ? ['Todos', 'Cartão', 'Pix', 'Boleto', 'Ajuste', 'Parcelado']
            : ['Todos', 'Cartão', 'Pix', 'Boleto', 'Parcelado'];

        /* ==== UI ==== */
        return (
          <div className="min-h-screen flex flex-col pb-12 bg-slate-50 dark:bg-slate-900">
              <header className="bg-white dark:bg-slate-800 shadow-sm px-4 py-3 flex justify-between items-center sticky top-0 z-10">
                  <div className="flex items-center gap-2">
                      <div className={`w-8 h-8 rounded-lg flex items-center justify-center text-white font-bold ${theme.bg}`}>{displayName[0]}</div>
                      <div><h1 className="font-bold text-sm sm:text-base text-slate-900 dark:text-slate-100">Meu Acerto</h1><p className="text-xs text-slate-500 dark:text-slate-400">Mês: {monthLabel(currentMonth)}</p></div>
                  </div>
                  <div className="flex items-center gap-2">

                                  : 'bg-slate-200 dark:bg-slate-700 text-slate-500 dark:text-slate-400'

                db={db}
                uid={uid}
                isOwner={isOwner}
                onDeleteHousehold={onDeleteHousehold}
                onSignOut={onSignOut}
              />
          </div>
        );
      };

      // ================== APP (Bootstrap Firebase + escolha de usuário) ==================
      const App = () => {
        const [auth, setAuth] = useState(null);
        const [db, setDb] = useState(null);
        const [authReady, setAuthReady] = useState(false);
        const [profileLoading, setProfileLoading] = useState(false);
        const [user, setUser] = useState(null);
        const [userProfile, setUserProfile] = useState(null);
        const [config, setConfig] = useState(null);
        const [activePanel, setActivePanel] = useState(null);
        const [isOwner, setIsOwner] = useState(false);
        const [firebaseError, setFirebaseError] = useState(null);

        useEffect(() => {
          const fb = window.FirebaseLib;
          if (!fb) return;

          const firebaseConfig = window.__FIREBASE_CONFIG__;
          if (!firebaseConfig || !firebaseConfig.apiKey || firebaseConfig.apiKey === 'YOUR_API_KEY') {
            setFirebaseError('Firebase não configurado. Copie firebase-config.example.js para firebase-config.js ou configure os secrets no GitHub.');
            return;
          }

          if (!window._meuAcertoApp) {
            const app = fb.initializeApp(firebaseConfig);
            window._meuAcertoApp = app;

            const dbInstance = fb.getFirestore(app);
            window._meuAcertoDb = dbInstance;
            setDb(dbInstance);

            fb.enableIndexedDbPersistence(dbInstance).catch(() => {});

            const authInstance = fb.getAuth(app);
            setAuth(authInstance);

            fb.onAuthStateChanged(authInstance, async (u) => {
              setUser(u);
              if (!u) {
                setUserProfile(null);
                setConfig(null);
                setActivePanel(null);
                setIsOwner(false);
                setAuthReady(true);
                setProfileLoading(false);
                return;
              }

              setProfileLoading(true);
              try {
                const pendingJoin = sessionStorage.getItem('meuAcertoPendingJoinCode');
                let profile = await ensureUserProfile(dbInstance, u);

                if (pendingJoin) {
                  sessionStorage.removeItem('meuAcertoPendingJoinCode');
                  if (profile?.householdId && profile.householdId !== pendingJoin) {
                    await window.FirebaseLib.signOut(authInstance).catch(() => {});
                    sessionStorage.setItem('meuAcertoJoinError', 'Esta conta já pertence a outra família.');
                    return;
                  }
                  if (profile?.householdId === pendingJoin) {
                    const cloudCfg = await loadHouseholdFromCloud(dbInstance, pendingJoin);
                    if (cloudCfg) {
                      saveAppConfig(u.uid, cloudCfg);
                      setConfig(cloudCfg);
                      setUserProfile(profile);
                      setIsOwner(await isHouseholdOwner(dbInstance, pendingJoin, u.uid));
                      setActivePanel(loadActivePanel(u.uid));
                    }
                  } else {
                    try {
                      const cfg = await joinHousehold(dbInstance, u.uid, pendingJoin);
                      saveAppConfig(u.uid, cfg);
                      setConfig(cfg);
                      setUserProfile({ ...profile, householdId: cfg.householdId, isGuest: false });
                      setIsOwner(false);
                      setActivePanel(null);
                    } catch (joinErr) {
                      console.error(joinErr);
                      await window.FirebaseLib.signOut(authInstance).catch(() => {});
                      const permDenied = joinErr.code === 'permission-denied';
                      sessionStorage.setItem('meuAcertoJoinError',
                        joinErr.message === 'NOT_FOUND' ? 'Código não encontrado. Confira se copiou certo.'
                        : joinErr.message === 'FULL' ? 'Esta família já tem 2 membros com conta.'
                        : permDenied ? 'Sem permissão para vincular. Publique as regras Firestore atualizadas.'
                        : 'Erro ao vincular à família. Tente novamente.');
                      return;
                    }
                  }
                } else if (profile?.householdId) {
                  const stillMember = await isUserMemberOfHousehold(dbInstance, u.uid, profile.householdId);
                  if (!stillMember) {
                    await linkUserToHousehold(dbInstance, u.uid, null);
                    profile = { ...profile, householdId: null };
                  }
                  if (profile.householdId) {
                  const cloudCfg = await loadHouseholdFromCloud(dbInstance, profile.householdId);
                  if (cloudCfg) {
                    saveAppConfig(u.uid, cloudCfg);
                    setConfig(cloudCfg);
                    setUserProfile(profile);
                    const owner = await isHouseholdOwner(dbInstance, profile.householdId, u.uid);
                    setIsOwner(owner);
                    setActivePanel(loadActivePanel(u.uid));
                  } else {
                    clearUserLocalData(u.uid);
                    await linkUserToHousehold(dbInstance, u.uid, null);
                    setUserProfile({ ...profile, householdId: null });
                    setConfig(null);
                    setActivePanel(null);
                    setIsOwner(false);
                  }
                  } else {
                    setUserProfile(profile);
                    clearUserLocalData(u.uid);
                    setConfig(null);
                    setActivePanel(null);
                    setIsOwner(false);
                  }
                } else {
                  setUserProfile(profile);
                  clearUserLocalData(u.uid);
                  setConfig(null);
                  setActivePanel(null);
                  setIsOwner(false);
                }
              } catch (e) {
                console.error(e);
              } finally {
                setProfileLoading(false);
                setAuthReady(true);
              }
            });
          } else {
            const app = window._meuAcertoApp;
            const dbInstance = window.FirebaseLib.getFirestore(app);
            window._meuAcertoDb = dbInstance;
            setDb(dbInstance);
            setAuth(window.FirebaseLib.getAuth(app));
            setAuthReady(true);
          }
        }, []);

        const handleSetupComplete = async (cfg, panel) => {
          setConfig(cfg);
          if (user?.uid) saveAppConfig(user.uid, cfg);
          if (cfg?.householdId) {
            setUserProfile((p) => p ? { ...p, householdId: cfg.householdId } : p);
            if (db && user?.uid) {
              const owner = await isHouseholdOwner(db, cfg.householdId, user.uid);
              setIsOwner(owner);
            }
          }
          if (panel) {
            setActivePanel(panel);
            if (user?.uid) saveActivePanel(user.uid, panel);
          }
        };

        const handleLogout = () => {
          setActivePanel(null);
          if (user?.uid) saveActivePanel(user.uid, null);
        };

        const handleSignOut = async () => {
          if (!auth || !user?.uid) return;
          const fb = window.FirebaseLib;
          clearUserLocalData(user.uid);
          setConfig(null);
          setActivePanel(null);
          setUserProfile(null);
          setIsOwner(false);
          await fb.signOut(auth);
        };

        const handleDeleteHousehold = async () => {
          if (!db || !config?.householdId || !isOwner || !user?.uid) return;
          await deleteHouseholdCascade(db, config.householdId);
          await linkUserToHousehold(db, user.uid, null);
          clearUserLocalData(user.uid);
          setConfig(null);
          setActivePanel(null);
          setIsOwner(false);
          setUserProfile((p) => p ? { ...p, householdId: null } : p);
        };

        if (firebaseError) {
          return (
            <div className="min-h-screen flex flex-col items-center justify-center bg-slate-50 dark:bg-slate-900 p-6">
              <p className="text-sm text-red-600 dark:text-red-400 text-center max-w-md">{firebaseError}</p>
            </div>
          );
        }

        if (!authReady || !db) {
          return (
            <div className="min-h-screen flex flex-col items-center justify-center bg-slate-50 dark:bg-slate-900">
              <div className="w-10 h-10 border-4 border-slate-300 border-t-indigo-500 rounded-full animate-spin mb-4" />
              <p className="text-sm text-slate-600 dark:text-slate-300">
                Carregando Meu Acerto...
              </p>
            </div>
          );
        }

        if (!user) {
          const joinError = sessionStorage.getItem('meuAcertoJoinError');
          if (joinError) sessionStorage.removeItem('meuAcertoJoinError');
          return <LoginScreen auth={auth} initialError={joinError || ''} />;
        }

        if (profileLoading) {
          return (
            <div className="min-h-screen flex flex-col items-center justify-center bg-slate-50 dark:bg-slate-900">
              <div className="w-10 h-10 border-4 border-slate-300 border-t-indigo-500 rounded-full animate-spin mb-4" />
              <p className="text-sm text-slate-600 dark:text-slate-300">Carregando perfil...</p>
            </div>
          );
        }

        if (!userProfile?.householdId || !config?.setupComplete) {
          return (
            <SetupWizard
              existingConfig={config}
              initialStep={undefined}
              onComplete={handleSetupComplete}
              db={db}
              uid={user.uid}
              userEmail={user.email}
              onSignOut={handleSignOut}
              isGuest={user.isAnonymous}
            />
          );
        }

        if (!activePanel) {
          return (
            <SetupWizard
              existingConfig={config}
              initialStep="select"
              onComplete={handleSetupComplete}
              db={db}
              uid={user.uid}
              userEmail={user.email}
              onSignOut={handleSignOut}
              isGuest={user.isAnonymous}
            />
          );
        }

        return (
          <Dashboard
            activePanel={activePanel}
            config={config}
            onLogout={handleLogout}
            onConfigChange={async (updated) => {
              setConfig(updated);
              if (user?.uid) saveAppConfig(user.uid, updated);
              try { await saveHouseholdToCloud(db, updated, user.uid); } catch (e) { console.error(e); }
            }}
            db={db}
            householdId={config.householdId}
            uid={user.uid}
            isOwner={isOwner}
            onDeleteHousehold={handleDeleteHousehold}
            onSignOut={handleSignOut}
          />
        );
      };

      const root = createRoot(document.getElementById('root'));
      root.render(<App />);

      if ('serviceWorker' in navigator && window.location.protocol !== 'file:') {
          navigator.serviceWorker.register('sw.js', { scope: './' }).then((reg) => {
            reg.update().catch(() => {});
          }).catch(() => {});
      }
    </script>
  </body>
</html>
