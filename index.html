<!DOCTYPE html>
<html lang="pt-PT">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Meu Acerto</title>
    <!-- PWA -->
    <link rel="manifest" href="manifest.json" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Meu Acerto" />
    <link rel="apple-touch-icon" href="https://placehold.co/180x180/4338ca/ffffff?text=Acerto" />
    <!-- Theme Colors -->
    <meta name="theme-color" content="#f8fafc" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#0f172a" media="(prefers-color-scheme: dark)">
    <!-- UI -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = { darkMode: 'media' }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <!-- React -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js" crossorigin="anonymous"></script>
    <!-- SheetJS -->
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <!-- Firebase config (gerado no deploy ou copie firebase-config.example.js) -->
    <script src="firebase-config.js"></script>
    <!-- Firebase Modular SDK -->
    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-app.js";
      import { 
        getFirestore, collection, doc, addDoc, updateDoc, deleteDoc, deleteField,
        onSnapshot, runTransaction, writeBatch, query, where, getDocs, getDoc, setDoc,
        enableIndexedDbPersistence, orderBy, limit, startAfter, documentId 
      } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-firestore.js";
      import { 
        getAuth, onAuthStateChanged, signOut,
        createUserWithEmailAndPassword, signInWithEmailAndPassword,
        signInWithPopup, GoogleAuthProvider
      } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-auth.js";

      window.FirebaseLib = {
        initializeApp, getFirestore, collection, doc, addDoc, updateDoc, deleteDoc, deleteField,
        onSnapshot, runTransaction, writeBatch, query, where, getDocs, getDoc, setDoc, enableIndexedDbPersistence,
        orderBy, limit, startAfter, documentId,
        getAuth, onAuthStateChanged, signOut,
        createUserWithEmailAndPassword, signInWithEmailAndPassword,
        signInWithPopup, GoogleAuthProvider
      };
    </script>
    <style>
      body { font-family: 'Inter', sans-serif; }
      .modal-enter { animation: fadeIn .2s ease-out; }
      @keyframes fadeIn { from { opacity: 0; transform: scale(.98);} to { opacity: 1; transform: scale(1);} }
    </style>
  </head>
  <body class="bg-slate-100 dark:bg-slate-900 text-slate-800 dark:text-slate-200 transition-colors duration-300">
    <div id="root">
      <div style="min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:Inter,sans-serif;background:#f8fafc;color:#475569">
        <div style="width:40px;height:40px;border:4px solid #cbd5e1;border-top-color:#6366f1;border-radius:50%;animation:spin 1s linear infinite;margin-bottom:16px"></div>
        <p style="font-size:14px">Carregando Meu Acerto...</p>
      </div>
      <style>@keyframes spin{to{transform:rotate(360deg)}}</style>
    </div>
    <script type="text/babel" data-presets="env,react">
      const { useState, useEffect, useMemo, useRef } = React;
      const { createRoot } = ReactDOM;

      /* ========= Styles Object ========= */
      const ui = {
        modal: "bg-white dark:bg-slate-900 text-slate-900 dark:text-slate-100 rounded-2xl shadow-xl p-6 max-w-md w-full m-4",
        label: "block text-sm font-medium text-slate-600 dark:text-slate-300 mb-1",
        input: "w-full rounded-xl border px-4 py-3 text-sm bg-white text-slate-900 placeholder-slate-400 " +
               "border-slate-200 focus:outline-none focus:ring-2 focus:ring-indigo-500 " +
               "dark:bg-slate-800 dark:text-slate-100 dark:placeholder-slate-500 dark:border-slate-700",
        select: "w-full rounded-xl border px-4 py-3 text-sm bg-white text-slate-900 " +
                "border-slate-200 focus:outline-none focus:ring-2 focus:ring-indigo-500 " +
                "dark:bg-slate-800 dark:text-slate-100 dark:border-slate-700",
        btnPrimary: "rounded-xl px-5 py-3 bg-pink-600 hover:bg-pink-700 text-white font-semibold shadow-md hover:shadow-lg transition-all " +
                    "dark:bg-pink-600 dark:hover:bg-pink-500",
        btnGhost: "rounded-xl px-4 py-2 text-slate-600 hover:text-slate-900 hover:bg-slate-100 " +
                  "dark:text-slate-300 dark:hover:text-white dark:hover:bg-slate-800 transition-colors"
      };

      /* ========= App Config ========= */
      const configStorageKey = (uid) => `meuAcertoAppConfig_${uid}`;
      const panelStorageKey = (uid) => `meuAcertoActivePanel_${uid}`;

      const generateId = () => {
        if (typeof crypto !== 'undefined' && crypto.randomUUID) return crypto.randomUUID();
        return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, (c) => {
          const r = Math.random() * 16 | 0;
          return (c === 'x' ? r : (r & 0x3 | 0x8)).toString(16);
        });
      };

      const loadAppConfig = (uid) => {
        if (!uid) return null;
        try {
          const raw = localStorage.getItem(configStorageKey(uid));
          if (!raw) return null;
          return JSON.parse(raw);
        } catch { return null; }
      };

      const saveAppConfig = (uid, cfg) => {
        if (!uid) return;
        try { localStorage.setItem(configStorageKey(uid), JSON.stringify(cfg)); } catch {}
      };

      const loadActivePanel = (uid) => {
        if (!uid) return null;
        try { return localStorage.getItem(panelStorageKey(uid)) || null; } catch { return null; }
      };

      const saveActivePanel = (uid, panel) => {
        if (!uid) return;
        try {
          if (panel) localStorage.setItem(panelStorageKey(uid), panel);
          else localStorage.removeItem(panelStorageKey(uid));
        } catch {}
      };

      const clearUserLocalData = (uid) => {
        if (!uid) return;
        try {
          localStorage.removeItem(configStorageKey(uid));
          localStorage.removeItem(panelStorageKey(uid));
        } catch {}
      };

      const authErrorMessage = (code, opts = {}) => {
        const { mode, hasFamilyCode } = opts;
        if (hasFamilyCode && mode === 'login' && (
          code === 'auth/user-not-found' || code === 'auth/wrong-password' || code === 'auth/invalid-credential'
        )) {
          return 'Conta não encontrada. Use a aba Criar conta para se cadastrar e vincular à família.';
        }
        const map = {
          'auth/email-already-in-use': hasFamilyCode
            ? 'Este e-mail já existe. Use a aba Entrar para vincular à família.'
            : 'Este e-mail já está cadastrado. Tente entrar.',
          'auth/invalid-email': 'E-mail inválido.',
          'auth/weak-password': 'A senha deve ter no mínimo 8 caracteres.',
          'auth/user-not-found': 'E-mail ou senha incorretos.',
          'auth/wrong-password': 'E-mail ou senha incorretos.',
          'auth/invalid-credential': 'E-mail ou senha incorretos.',
          'auth/popup-closed-by-user': 'Login com Google cancelado.',
          'auth/too-many-requests': 'Muitas tentativas. Aguarde um momento.',
        };
        return map[code] || 'Erro ao autenticar. Tente novamente.';
      };

      const getUserProfile = async (db, uid) => {
        if (!db || !window.FirebaseLib || !uid) return null;
        const { doc, getDoc } = window.FirebaseLib;
        const snap = await getDoc(doc(db, 'users', uid));
        return snap.exists() ? snap.data() : null;
      };

      const ensureUserProfile = async (db, user) => {
        if (!db || !user?.uid) return null;
        const { doc, getDoc, setDoc } = window.FirebaseLib;
        const ref = doc(db, 'users', user.uid);
        const snap = await getDoc(ref);
        if (snap.exists()) {
          const data = snap.data();
          if (!user.isAnonymous && data.isGuest) {
            await setDoc(ref, { isGuest: false, email: user.email || data.email || '' }, { merge: true });
            return { ...data, isGuest: false, email: user.email || data.email || '' };
          }
          return data;
        }
        const profile = {
          email: user.email || '',
          householdId: null,
          createdAt: new Date().toISOString(),
          isGuest: false,
        };
        await setDoc(ref, profile);
        return profile;
      };

      const stashPendingJoinCode = (code) => {
        const trimmed = (code || '').trim();
        if (trimmed) sessionStorage.setItem('meuAcertoPendingJoinCode', trimmed);
      };

      const linkUserToHousehold = async (db, uid, householdId) => {
        if (!db || !uid) return;
        const { doc, setDoc } = window.FirebaseLib;
        await setDoc(doc(db, 'users', uid), { householdId: householdId || null }, { merge: true });
      };

      const isUserMemberOfHousehold = async (db, uid, householdId) => {
        if (!db || !uid || !householdId) return false;
        const { doc, getDoc } = window.FirebaseLib;
        const snap = await getDoc(doc(db, 'households', householdId));
        return snap.exists() && uid in (snap.data().members || {});
      };

      const isHouseholdOwner = async (db, householdId, uid) => {
        if (!db || !householdId || !uid) return false;
        const { doc, getDoc } = window.FirebaseLib;
        const snap = await getDoc(doc(db, 'households', householdId));
        return snap.exists() && snap.data().createdBy === uid;
      };

      const BANKS = [
        { id: 'itau', name: 'Itaú Unibanco', enabled: false },
        { id: 'bb', name: 'Banco do Brasil', enabled: false },
        { id: 'bradesco', name: 'Bradesco', enabled: false },
        { id: 'santander', name: 'Santander Brasil', enabled: false },
        { id: 'caixa', name: 'Caixa Econômica Federal', enabled: false },
        { id: 'nubank', name: 'Nubank', enabled: false },
        { id: 'inter', name: 'Banco Inter', enabled: false },
        { id: 'c6', name: 'C6 Bank', enabled: true },
        { id: 'mercadopago', name: 'Mercado Pago', enabled: false },
        { id: 'picpay', name: 'PicPay', enabled: false },
      ];

      const getBankById = (bankId) => BANKS.find((b) => b.id === bankId) || null;
      const getBankName = (bankId) => getBankById(bankId)?.name || bankId || '';

      const mergeDiscoveredCards = (existingCards, discovered, bankId) => {
        const list = [...(existingCards || [])];
        for (const d of discovered) {
          if (!d?.last4) continue;
          const idx = list.findIndex((c) => c.last4 === d.last4 && (c.bankId || '') === bankId);
          if (idx < 0) {
            list.push({
              id: generateId(),
              label: (d.label || `Cartão final ${d.last4}`).trim(),
              last4: d.last4,
              owner: 'personA',
              bankId,
            });
          } else {
            const cur = { ...list[idx] };
            if (!cur.label?.trim() && d.label) cur.label = d.label.trim();
            if (!cur.bankId) cur.bankId = bankId;
            list[idx] = cur;
          }
        }
        return list;
      };

      const getExpenseBankId = (expense, cards = []) => {
        if (expense?.bankId) return expense.bankId;
        if (expense?.type !== 'Cartão') return null;
        const card = findCardByPaymentSource(expense.paymentSource, cards);
        return card?.bankId || null;
      };

      const banksUsedInConfig = (cards = []) => {
        const ids = new Set((cards || []).map((c) => c.bankId).filter(Boolean));
        return BANKS.filter((b) => ids.has(b.id));
      };

      const banksUsedInMonth = (expenses = [], cards = []) => {
        const ids = new Set();
        expenses.forEach((e) => {
          if (e.type !== 'Cartão') return;
          const bid = getExpenseBankId(e, cards);
          if (bid) ids.add(bid);
        });
        (cards || []).forEach((c) => { if (c.bankId) ids.add(c.bankId); });
        return BANKS.filter((b) => ids.has(b.id));
      };

      const buildConfig = (hid, personAName, personBName, cards) => ({
        householdId: hid,
        personA: { name: personAName.trim() },
        personB: { name: personBName.trim() },
        cards: (cards || []).map((c) => ({
          id: c.id || generateId(),
          label: (c.label || '').trim(),
          last4: String(c.last4 || '').trim(),
          owner: c.owner || 'personA',
          bankId: c.bankId || '',
        })),
        setupComplete: true,
      });

      const saveHouseholdToCloud = async (db, cfg, uid, options = {}) => {
        if (!db || !window.FirebaseLib || !cfg?.householdId) return;
        const { doc, setDoc } = window.FirebaseLib;
        const payload = {
          householdId: cfg.householdId,
          personA: cfg.personA,
          personB: cfg.personB,
          cards: cfg.cards || [],
          setupComplete: true,
        };
        if (options.isCreate && uid) {
          payload.createdBy = uid;
          payload.members = { [uid]: 'owner' };
        }
        await setDoc(doc(db, 'households', cfg.householdId), payload, { merge: true });
        if (options.isCreate && uid) {
          await linkUserToHousehold(db, uid, cfg.householdId);
        }
      };

      const joinHousehold = async (db, uid, householdId) => {
        if (!db || !uid || !householdId) throw new Error('INVALID');
        const { doc, runTransaction } = window.FirebaseLib;
        const ref = doc(db, 'households', householdId);
        let householdData = null;

        await runTransaction(db, async (transaction) => {
          const snap = await transaction.get(ref);
          if (!snap.exists()) throw new Error('NOT_FOUND');
          const data = snap.data();
          let members = { ...(data.members || {}) };

          if (members[uid]) {
            householdData = { ...data, members };
            return;
          }

          // Libera vaga removendo convites anônimos antigos (só no mapa members)
          for (const memberUid of Object.keys(members)) {
            if (memberUid === uid) continue;
            const userRef = doc(db, 'users', memberUid);
            const userSnap = await transaction.get(userRef);
            if (userSnap.exists() && userSnap.data().isGuest) {
              delete members[memberUid];
            }
          }

          if (Object.keys(members).length >= 2) throw new Error('FULL');

          members[uid] = 'member';
          transaction.update(ref, { members });
          householdData = { ...data, members };
        });

        await linkUserToHousehold(db, uid, householdId);
        return buildConfig(
          householdId,
          householdData.personA?.name || 'Pessoa 1',
          householdData.personB?.name || 'Pessoa 2',
          householdData.cards || []
        );
      };

      const deleteHouseholdCascade = async (db, householdId) => {
        if (!db || !householdId) return;
        const { collection, query, where, getDocs, writeBatch, doc, getDoc, deleteDoc } = window.FirebaseLib;

        const hSnap = await getDoc(doc(db, 'households', householdId));

        const deleteByHousehold = async (collName) => {
          const q = query(collection(db, collName), where('householdId', '==', householdId));
          const snap = await getDocs(q);
          let batch = writeBatch(db);
          let count = 0;
          for (const d of snap.docs) {
            batch.delete(d.ref);
            count++;
            if (count >= 400) {
              await batch.commit();
              batch = writeBatch(db);
              count = 0;
            }
          }
          if (count > 0) await batch.commit();
        };

        await deleteByHousehold('expenses');
        await deleteByHousehold('installmentPlans');
        if (hSnap.exists()) await deleteDoc(doc(db, 'households', householdId));
      };

      const loadHouseholdFromCloud = async (db, householdId) => {
        if (!db || !window.FirebaseLib || !householdId) return null;
        const { doc, getDoc } = window.FirebaseLib;
        const snap = await getDoc(doc(db, 'households', householdId));
        if (!snap.exists()) return null;
        const d = snap.data();
        return buildConfig(
          householdId,
          d.personA?.name || 'Pessoa 1',
          d.personB?.name || 'Pessoa 2',
          d.cards || []
        );
      };

      const nameA = (cfg) => (cfg?.personA?.name || 'Pessoa 1').trim();
      const nameB = (cfg) => (cfg?.personB?.name || 'Pessoa 2').trim();

      const cardDisplaySource = (card) => `${card.label} (final ${card.last4})`;

      const findCardByLast4 = (last4, cards = []) =>
        cards.find((c) => c.last4 === last4) || null;

      const findCardByPaymentSource = (src, cards = []) => {
        const s = norm(src);
        if (!s || !cards.length) return null;

        // 1) Final explícito no texto — evita confundir cartões com mesmo titular
        const explicit = (() => {
          const m = String(src || '').match(/\(final\s*(\d{4})\)/i)
            || String(src || '').match(/\bfinal\s*(\d{4})\b/i);
          return m ? m[1] : null;
        })();
        if (explicit) {
          const exact = cards.find((c) => c.last4 === explicit);
          if (exact) return exact;
        }

        // 2) Qualquer last4 cadastrado presente na string (só se for único)
        const byLast4 = cards.filter((c) => c.last4 && s.includes(c.last4));
        if (byLast4.length === 1) return byLast4[0];

        // 3) Rótulo — só se houver um único cartão com esse nome
        const byLabel = cards.filter((c) => {
          const lbl = norm(c.label);
          return lbl.length >= 3 && s.includes(lbl);
        });
        if (byLabel.length === 1) return byLabel[0];

        return null;
      };

      const panelUserFromCard = (card) => {
        if (!card) return 'personA';
        if (card.owner === 'personB') return 'personB';
        return 'personA';
      };

      const defaultCardForPanel = (panel, cfg) => {
        const cards = cfg?.cards || [];
        const match = cards.find((c) => c.owner === panel)
          || cards.find((c) => c.owner === 'personA')
          || cards[0];
        return match ? cardDisplaySource(match) : 'Cartão';
      };

      const isSplitPersonA = (split, cfg) => {
        const s = norm(split);
        return s === norm(nameA(cfg)) || s === 'persona' || split === 'personA';
      };

      const isSplitPersonB = (split, cfg) => {
        const s = norm(split);
        return s === norm(nameB(cfg)) || s === 'personb' || split === 'personB';
      };

      const isPaidByPersonA = (paidBy, cfg) =>
        paidBy === 'personA' || norm(paidBy) === norm(nameA(cfg));

      const isPaidByPersonB = (paidBy, cfg) =>
        paidBy === 'personB' || norm(paidBy) === norm(nameB(cfg));

      /* ========= Helpers ========= */
      const norm = (s) => 
        String(s || "")
          .normalize("NFD")
          .replace(/[\u0300-\u036f]/g, "")
          .trim()
          .toLowerCase();

      const canonicalSplit = (s, cfg) => {
        const n = norm(s);
        if (cfg && n === norm(nameA(cfg))) return nameA(cfg);
        if (cfg && n === norm(nameB(cfg))) return nameB(cfg);
        return 'Dividido';
      };

      const uiOwner = (e, cfg) => {
        if (cfg) {
          if (isSplitPersonA(e.split, cfg)) return 'persona';
          if (isSplitPersonB(e.split, cfg)) return 'personb';
        }
        const who = norm(e.paidBy || e.owner || e.user || e.person || e.responsavel);
        if (who === 'persona' || (cfg && who === norm(nameA(cfg)))) return 'persona';
        if (who === 'personb' || (cfg && who === norm(nameB(cfg)))) return 'personb';
        return 'dividido';
      };

      const stripeBySplit = (e, cfg) => {
        const owner = uiOwner(e, cfg);
        const base = "before:content-[''] before:absolute before:left-0 before:top-2 before:bottom-2 before:w-1.5 before:rounded-full";
        if (owner === 'persona') return base + ' before:bg-indigo-500';
        if (owner === 'personb') return base + ' before:bg-pink-500';
        return '';
      };

      const shouldIgnorePaymentInclusion = (row, chosenDesc) => {
        const normLocal = (s) => String(s || "")
          .normalize("NFD").replace(/[\u0300-\u036f]/g, "")
          .toLowerCase().trim();
        const haystack = [chosenDesc, ...row].map(normLocal).join(" ");
        return /\binclusao\s+de\s+pagament/.test(haystack);
      };

      // --- IMPORT HELPER ---
      async function readSpreadsheetFile(file) {
        const isXlsx = /\.(xlsx?|xls)$/i.test(file.name);
        const data = await new Promise((resolve, reject) => {
          const r = new FileReader();
          r.onload = () => resolve(r.result);
          r.onerror = reject;
          if (isXlsx) r.readAsArrayBuffer(file); else r.readAsText(file, "utf-8");
        });

        if (!isXlsx) {
          // 🔹 DETECÇÃO AUTOMÁTICA DE DELIMITADOR (vírgula ou ponto-e-vírgula)
          const firstLine = data.split('\n')[0] || '';
          const hasSemicolon = firstLine.includes(';');
          const hasComma = firstLine.includes(',');
          
          let delimiter = ','; // padrão
          if (hasSemicolon && !hasComma) {
            delimiter = ';'; // CSV europeu
          } else if (hasSemicolon && hasComma) {
            // Se tem ambos, conta qual aparece mais na primeira linha
            const semiCount = (firstLine.match(/;/g) || []).length;
            const commaCount = (firstLine.match(/,/g) || []).length;
            delimiter = semiCount > commaCount ? ';' : ',';
          }
          
          const wb = XLSX.read(data, { type: "string", FS: delimiter });
          const ws = wb.Sheets[wb.SheetNames[0]];
          return XLSX.utils.sheet_to_json(ws, { header: 1, defval: "", raw: false, blankrows: false });
        }

        const wb = XLSX.read(data, { type: "array" });
        let best = [], bestLen = -1;
        for (const name of wb.SheetNames) {
          const ws = wb.Sheets[name];
          const rows = XLSX.utils.sheet_to_json(ws, { header: 1, defval: "", raw: false, blankrows: false });
          const filled = rows.filter(r => (r || []).some(c => String(c||'').trim() !== '')).length;
          if (filled > bestLen) { bestLen = filled; best = rows; }
        }
        return best;
      }

      // --- PARSER DE PARCELA (ATUALIZADO V2) ---
      function parseInstallmentFromCell(cellValue) {
        if (cellValue == null || cellValue === '') {
          return { isInstallment: false };
        }

        // 1. Se o Excel converteu "1/10" em número (ex.: 0.1)
        if (typeof cellValue === 'number') {
          const v = cellValue;

          // Só faz sentido tentar fração se for entre 0 e 1 (evita pegar 1, 2, 3...)
          if (v > 0 && v < 1) {
            for (let d = 2; d <= 60; d++) {
              const n = Math.round(v * d);
              if (Math.abs(v - n / d) < 0.0001) {
                if (n >= 1 && n <= d) {
                  return {
                    isInstallment: true,
                    info: `${n}/${d}`,
                    current: n,
                    total: d,
                  };
                }
              }
            }
          }

          return { isInstallment: false };
        }

        let raw = String(cellValue).trim();
        let normalized = raw
          .normalize('NFD')
          .replace(/[\u0300-\u036f]/g, '')
          .toLowerCase();

        // valores que significam "não é parcelado"
        if (
          normalized === 'unica' ||
          normalized === 'única' ||
          normalized === 'a vista' ||
          normalized === 'avista'
        ) {
          return { isInstallment: false };
        }

        // 2. Padrões tipo "1/10", "02/12", "1 de 10", "1 DE 10"
        const match =
          raw.match(/^(\d+)\s*[\/\\]\s*(\d+)$/) ||
          raw.match(/^(\d+)\s*(?:de|DE|of)\s*(\d+)$/);

        if (match) {
          const current = parseInt(match[1], 10);
          const total = parseInt(match[2], 10);
          if (
            Number.isFinite(current) &&
            Number.isFinite(total) &&
            total > 1 &&
            current >= 1 &&
            current <= total
          ) {
            return {
              isInstallment: true,
              info: `${current}/${total}`,
              current,
              total,
            };
          }
        }

        return { isInstallment: false };
      }

      // --- FALLBACK: Varredura de Linha (Conservador V2) ---
      // Aqui NÃO aceitamos data, para não confundir a coluna de Data com parcela
      const extractParcelaFromText = (text) => {
        if (!text) return null;
        let s = String(text).normalize("NFD").replace(/\p{Diacritic}/gu, "").toLowerCase();

        // Remove datas completas
        s = s.replace(/\b\d{1,2}\s*[\/\-]\s*\d{1,2}\s*[\/\-]\s*\d{2,4}\b/g, " ");   
        
        // 🔹 Remove códigos que não são parcelas (ex: 06DE10, 57507636, etc)
        // Códigos geralmente têm letras grudadas ou são números muito grandes
        s = s.replace(/\b\d{2}[a-z]{2}\d{2}\b/gi, " "); // ex: 06DE10, 95AB23
        s = s.replace(/\b\d{5,}\b/g, " "); // números com 5+ dígitos não são parcelas

        let m = s.match(/\b(\d{1,2})\s*[\/\\]\s*(\d{1,2})\b/);
        if (m) {
          const cur = parseInt(m[1]);
          const tot = parseInt(m[2]);
          // 🔹 Validação mais rigorosa: parcela atual deve ser <= total e total <= 60 (máximo razoável)
          if (cur >= 1 && cur <= tot && tot > 1 && tot <= 60) {
            return `${cur}/${tot}`;
          }
        }

        m = s.match(/\b(\d{1,2})\s*(?:de|of)\s*(\d{1,2})\b/);
        if (m) {
          const cur = parseInt(m[1]);
          const tot = parseInt(m[2]);
          if (cur >= 1 && cur <= tot && tot > 1 && tot <= 60) {
            return `${cur}/${tot}`;
          }
        }

        return null;
      };

      const parcelaFromRowFallback = (row) => {
        for (const c of row) {
          const p = extractParcelaFromText(c);
          if (p) return p;
        }
        return null;
      };

      // --- HELPER DE DETECÇÃO DE LINHA INTEIRA (V2 - com heurística de colunas adjacentes) ---
      function detectInstallmentForRow(row = [], cols = {}) {
        // 1. Se temos uma coluna claramente de parcela, usar ela primeiro
        if (typeof cols.idxParcela === 'number' && cols.idxParcela >= 0) {
          const directInfo = parseInstallmentFromCell(row[cols.idxParcela]);
          if (directInfo.isInstallment) return directInfo;

          // 1b. Heurística: "Parcela" em uma coluna e "Qtd Parcelas" na coluna logo ao lado
          const curCell = row[cols.idxParcela];
          const totalCell = row[cols.idxParcela + 1];

          const toNum = (v) => {
            if (v == null || v === '') return NaN;
            if (typeof v === 'number') return v;
            const s = String(v).replace(/[^\d]/g, '');
            return s ? Number(s) : NaN;
          };

          const curNum = toNum(curCell);
          const totNum = toNum(totalCell);

          if (
            Number.isFinite(curNum) &&
            Number.isFinite(totNum) &&
            totNum > 1 &&
            curNum >= 1 &&
            curNum <= totNum
          ) {
            return {
              isInstallment: true,
              info: `${curNum}/${totNum}`,
              current: curNum,
              total: totNum,
            };
          }
        }

        // Índices que não fazem sentido para parcela
        const skip = new Set(
          [cols.idxData, cols.idxDescricao, cols.idxValorBRL, cols.idxValorGen, cols.idxTitular]
            .filter((i) => typeof i === 'number' && i >= 0)
        );

        // 2. Varre as outras colunas procurando algo que pareça "1/10", "2 de 5" etc.
        for (let i = 0; i < row.length; i++) {
          if (skip.has(i)) continue;
          const info = parseInstallmentFromCell(row[i]);
          if (info.isInstallment) return info;
        }

        // 3. Fallback extra com o extrator antigo (mais permissivo)
        const pText = parcelaFromRowFallback(row);
        if (pText) {
          const [cur, tot] = pText.split('/').map(Number);
          if (Number.isFinite(cur) && Number.isFinite(tot) && tot > 1 && cur >= 1 && cur <= tot) {
            return {
              isInstallment: true,
              info: pText,
              current: cur,
              total: tot,
            };
          }
        }

        return { isInstallment: false };
      }

      const last4FromRow = (row = [], cards = []) => {
        const knownLast4 = new Set((cards || []).map((c) => c.last4).filter(Boolean));
        for (const cell of row) {
          const raw = String(cell ?? '');
          const s = raw.normalize('NFD').replace(/\p{Diacritic}/gu, '').toLowerCase();
          let m = s.match(/\bfinal\s*(\d{4})\b/);
          if (m) return m[1];
          m = s.match(/(?:\*{2,}|x{3,}|xxxx)\s*(\d{4})\b/);
          if (m) return m[1];
          for (const l4 of knownLast4) {
            if (new RegExp(`\\b${l4}\\b`).test(s)) return l4;
          }
          m = s.match(/\b(?!20\d{2}\b)(\d{4})\b/);
          if (m) return m[1];
        }
        return null;
      };

      const last4FromRowC6 = (row = [], cards = []) => {
        const knownLast4 = new Set((cards || []).map((c) => c.last4).filter(Boolean));
        const c6Last4 = ['2581', '1009', '7292'];
        for (const cell of row) {
          const raw = String(cell ?? '');
          const s = raw.normalize('NFD').replace(/\p{Diacritic}/gu, '').toLowerCase();
          let m = s.match(/\bfinal\s*(\d{4})\b/);
          if (m) return m[1];
          m = s.match(/(?:\*{2,}|x{3,}|xxxx)\s*(\d{4})\b/);
          if (m) return m[1];
          for (const l4 of c6Last4) {
            if (new RegExp(`\\b${l4}\\b`).test(s)) return l4;
          }
          for (const l4 of knownLast4) {
            if (new RegExp(`\\b${l4}\\b`).test(s)) return l4;
          }
          m = s.match(/\b(?!20\d{2}\b)(\d{4})\b/);
          if (m) return m[1];
        }
        return null;
      };

      const titularFromRowC6 = (row, cols, last4) => {
        if (cols.idxTitular >= 0) {
          const t = String(row[cols.idxTitular] || '').trim();
          if (t && t.length > 2 && !/^\d{4}$/.test(t)) return t;
        }
        for (const cell of row) {
          const s = String(cell ?? '').trim();
          if (!s || s === last4 || /^\d{4}$/.test(s)) continue;
          if (/^\d{1,2}\/\d{1,2}\/\d{2,4}$/.test(s)) continue;
          if (/^(única|unica|eletrico|eletrônico)$/i.test(s)) continue;
          if (/r\$\s*\d/i.test(s)) continue;
          if (s.length >= 3) return s;
        }
        return `Cartão final ${last4}`;
      };

      const parseC6Spreadsheet = (rows, config, householdId, currentMonth) => {
        const normH = (h) => norm(h || '');
        const isHeaderRow = (r = []) => {
          const s = r.map((x) => norm(x));
          const hasData = s.some((c) => /\bdata\b/.test(c));
          const hasDesc = s.some((c) => /(descri|estab|hist|favorecido|detalhe|loja|comprovante)/.test(c));
          const hasValor = s.some((c) => /(valor|d[eé]bito|cr[eé]dito|amount|total)/.test(c));
          return (hasData && hasValor) || (hasData && hasDesc);
        };
        let headerIdx = rows.findIndex(isHeaderRow);
        if (headerIdx < 0) headerIdx = 0;

        const header = rows[headerIdx] || [];
        const body = rows.slice(headerIdx + 1);
        const cols = detectColumns(header);

        const discoveredMap = new Map();
        const expenses = [];

        for (const row of body) {
          const rawDate = cols.idxData >= 0 ? row[cols.idxData] : null;
          let dateStr = null;
          if (rawDate) dateStr = excelSerialToPT(rawDate);
          if (!dateStr) {
            for (const c of row) {
              const s = String(c).trim();
              if (/^\d{1,2}[\/\-]\d{1,2}[\/\-]\d{2,4}$/.test(s)) { dateStr = s; break; }
            }
          }
          if (!dateStr) continue;

          const mk = monthKeyFromPtDate(dateStr);
          const desc = getDescriptionFromRow(row, cols);
          if (shouldIgnorePaymentInclusion(row, desc)) continue;

          let amount = NaN;
          if (cols.idxValorBRL >= 0) amount = parseMoney(row[cols.idxValorBRL]);
          if (!Number.isFinite(amount) && cols.idxValorGen >= 0) amount = parseMoney(row[cols.idxValorGen]);
          if (!Number.isFinite(amount)) {
            for (let i = row.length - 1; i >= 0; i--) {
              const n = parseMoney(row[i]);
              if (Number.isFinite(n) && Math.abs(n) > 0) { amount = n; break; }
            }
          }
          if (!Number.isFinite(amount)) continue;

          const parcelaInfo = detectInstallmentForRow(row, cols);
          const last4 = last4FromRowC6(row, config.cards);
          if (!last4) continue;

          const label = titularFromRowC6(row, cols, last4);
          if (!discoveredMap.has(last4)) discoveredMap.set(last4, { last4, label });

          let source = 'Cartão';
          const matchedCard = findCardByLast4(last4, config.cards);
          if (matchedCard) source = cardDisplaySource(matchedCard);
          else source = `Cartão (final ${last4})`;

          let panelUserVal = 'personA';
          if (matchedCard) panelUserVal = panelUserFromCard(matchedCard);

          expenses.push({
            householdId,
            description: desc,
            amount: round2(amount),
            date: dateStr,
            type: 'Cartão',
            paymentSource: source,
            bankId: 'c6',
            split: 'Dividido',
            paidBy: 'Cartão',
            monthKey: currentMonth,
            originalMonthKey: mk,
            parcela: parcelaInfo.isInstallment ? parcelaInfo.info : null,
            isInstallment: parcelaInfo.isInstallment,
            installmentTotal: parcelaInfo.total,
            installmentCurrent: parcelaInfo.current,
            installmentPlanId: parcelaInfo.isInstallment
              ? `${norm(desc)}|${last4}|${parcelaInfo.total}`
              : null,
            panelUser: panelUserVal,
          });
        }

        return {
          expenses,
          discovered: Array.from(discoveredMap.values()),
          bankId: 'c6',
        };
      };

      const createImportStub = (bankId) => () => {
        const bank = getBankById(bankId);
        throw new Error(`IMPORT_NOT_READY:${bank?.name || bankId}`);
      };

      const importParsers = {
        c6: (rows, config, householdId, currentMonth) => parseC6Spreadsheet(rows, config, householdId, currentMonth),
        itau: createImportStub('itau'),
        bb: createImportStub('bb'),
        bradesco: createImportStub('bradesco'),
        santander: createImportStub('santander'),
        caixa: createImportStub('caixa'),
        nubank: createImportStub('nubank'),
        inter: createImportStub('inter'),
        mercadopago: createImportStub('mercadopago'),
        picpay: createImportStub('picpay'),
      };

      const parseMoney = (input) => {
        if (input == null) return NaN;
        if (typeof input === 'number') return input;
        let s = String(input).replace(/\u00a0/g, ' ').replace(/[^\d.,\-()]/g, '').trim();
        if (!s) return NaN;
        let neg = false;
        if (/^.*$/.test(s)) { neg = true; s = s.slice(1, -1); }
        else if (/-$/.test(s))  { neg = true; s = s.slice(0, -1); }
        else if (s.startsWith('-')) { neg = true; s = s.slice(1); }
        const lastComma = s.lastIndexOf(',');
        const lastDot   = s.lastIndexOf('.');
        if (lastComma > lastDot) { s = s.replace(/\./g, '').replace(',', '.'); }   
        else { s = s.replace(/,/g, ''); }
        const n = parseFloat(s);
        return Number.isFinite(n) ? (neg ? -n : n) : NaN;
      };

      const excelSerialToPT = (v) => {
        if (typeof v === 'number') {
          const ms = Math.round((v - 25569) * 86400 * 1000);
          return new Date(ms).toLocaleDateString('pt-PT', { timeZone: 'UTC' });
        }
        if (typeof v === 'string') {
          if (/^\d{2}\/\d{2}\/\d{4}$/.test(v)) return v;
          if (/^\d{4}-\d{2}-\d{2}/.test(v)) return new Date(v).toLocaleDateString('pt-PT', { timeZone: 'UTC' });
          const m = v.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{2})$/);
          if (m) return `${m[1].padStart(2,'0')}/${m[2].padStart(2,'0')}/20${m[3]}`;
        }
        return new Date().toLocaleDateString('pt-PT', { timeZone: 'UTC' });
      };

      const formatBRL = (v) => new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL'}).format(v || 0);
      const round2 = (v) => Math.round((v + Number.EPSILON) * 100) / 100;

      const ptDateToDateObj = (pt) => {
        const m = String(pt || '').match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{4})$/);
        if (!m) return null;
        return new Date(Number(m[3]), Number(m[2]) - 1, Number(m[1]), 12);
      };

      const monthKeyFromPtDate = (pt) => {
        const m = String(pt || '').match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{4})$/);
        if (!m) return null;
        return `${m[3]}-${m[2].padStart(2,'0')}`;
      };

      const monthKeyFromDateObj = (d) => {
        const yyyy = d.getFullYear();
        const mm = String(d.getMonth() + 1).padStart(2,'0');
        return `${yyyy}-${mm}`;
      };

      const currentMonthKey = () => monthKeyFromDateObj(new Date());

      const monthLabel = (monthKey) => {
        if (!monthKey) return '';
        const [yyyy, mm] = monthKey.split('-').map(Number);
        const d = new Date(yyyy, mm - 1, 1);
        const nomeMes = d.toLocaleDateString('pt-BR', { month: 'long' });
        return `${nomeMes.charAt(0).toUpperCase() + nomeMes.slice(1)} ${yyyy}`;
      };

      const shiftMonthKey = (monthKey, delta) => {
        if (!monthKey) return currentMonthKey();
        const [yyyy, mm] = monthKey.split('-').map(Number);
        const d = new Date(yyyy, mm - 1 + delta, 1);
        return monthKeyFromDateObj(d);
      };

      const ownerFromPaymentSource = (src, cards = []) => {
        const card = findCardByPaymentSource(src, cards);
        if (!card) return null;
        if (card.owner === 'both') return 'both';
        if (card.owner === 'personB') return 'personB';
        return 'personA';
      };

      // --- DETECÇÃO DE COLUNAS (Flexível) ---
      const detectColumns = (headerRow = []) => {
        const h = headerRow.map(norm);
        const find = (re) => h.findIndex((x) => re.test(x));
        return {
          idxDescricao: find(/^(descricao|descrição|estabelecimento|historico|histórico|loja|detalhe)/),
          // Remove ^ para pegar "Qtd Parcelas", "Nº Parcela", etc.
          idxParcela:   find(/(parcela|parcelas|prest|n\S* parc|qtd.*parc)/),   
          idxData:      find(/^(data|lan[cç]amento|transa[cç][aã]o)/),
          idxValorBRL:  find(/^(valor.*r\$|valor ?em r\$??)/),
          idxValorGen:  find(/^(valor|amount|total|d[eé]bito|cr[eé]dito)/),
          idxTitular:   find(/(titular|portador|nome do titular|cliente)/),
        };
      };

      const getDescriptionFromRow = (row = [], cols) => {
        let desc = cols.idxDescricao >= 0 ? row[cols.idxDescricao] : "";
        if (!String(desc || "").trim()) {
          const titular = cols.idxTitular >= 0 ? String(row[cols.idxTitular] || "") : "";
          let best = "";
          for (const cell of row) {
            const s = String(cell || "").trim();
            if (s.length >= 3 && s !== titular && !/r\$\s*\d/.test(s) && !/^\d{1,2}\/\d{1,2}/.test(s)) {
              if (s.length > best.length) best = s;
            }
          }
          desc = best;
        }
        desc = String(desc || "").replace(/\s+/g, " ").trim();
        const titular = cols.idxTitular >= 0 ? String(row[cols.idxTitular] || "") : "";
        if (desc && titular && norm(desc) === norm(titular)) {
          for (const cell of row) {
            const s = String(cell || "").trim();
            if (s && norm(s) !== norm(titular) && s.length > 3 && !/r\$\s*\d/.test(s)) {
              desc = s; break;
            }
          }
        }
        return desc;
      };

      /* ========= MIGRATION UTILS ========= */
      async function backfillAllMonthKeys(db) {
        if (!window.FirebaseLib) return;
        const { collection, query, orderBy, limit, startAfter, getDocs, writeBatch, documentId } = window.FirebaseLib;
        const expCol = collection(db, 'expenses');
        let lastDoc = null;
        let totalAtualizados = 0;
        while (true) {
          let constraints = [orderBy(documentId()), limit(500)];
          if (lastDoc) constraints.push(startAfter(lastDoc));
          const q = query(expCol, ...constraints);
          const snap = await getDocs(q);
          if (snap.empty) break;
          const batch = writeBatch(db);
          let changed = 0;
          snap.docs.forEach(dSnap => {
            const d = dSnap.data() || {};
            if (!d.monthKey && d.date) {
              const mk = monthKeyFromPtDate(d.date);
              if (mk) { batch.update(dSnap.ref, { monthKey: mk }); changed++; }
            }
          });
          if (changed > 0) { await batch.commit(); totalAtualizados += changed; }
          lastDoc = snap.docs[snap.docs.length - 1];
        }
        if(totalAtualizados > 0) localStorage.setItem('mkBackfillDone', '1');
      }

      async function backfillSplitFromPaidBy(db) {
        if (!window.FirebaseLib) return;
        const { collection, query, orderBy, limit, startAfter, getDocs, writeBatch, documentId } = window.FirebaseLib;
        const expCol = collection(db, "expenses");
        let last = null, total = 0;
        while (true) {
          let constraints = [orderBy(documentId()), limit(500)];
          if (last) constraints.push(startAfter(last));
          const q = query(expCol, ...constraints);
          const snap = await getDocs(q);
          if (snap.empty) break;
          const batch = writeBatch(db);
          let changed = 0;
          snap.docs.forEach(doc => {
            const d = doc.data() || {};
            const current = norm(d.split);
            const who = norm(d.paidBy || d.owner || d.user || d.person || d.responsavel);
            if ((!current || current === "dividido") && (who === "guilherme" || who === "thais")) {
              const newSplit = who === "guilherme" ? "Guilherme" : "Thais";
              batch.update(doc.ref, { split: newSplit });
              changed++;
            }
          });
          if (changed > 0) { await batch.commit(); total += changed; }
          last = snap.docs[snap.docs.length - 1];
        }
        if(total > 0) localStorage.setItem('splitBackfillDone', '1');
      }

      window.removeZeroAmountForMonth = async (db, currentMonth) => {
        if(!db || !currentMonth || !window.FirebaseLib) return;
        const { collection, query, where, getDocs, writeBatch } = window.FirebaseLib;
        const exp = collection(db, 'expenses');
        const snap = await getDocs(query(exp, where('monthKey','==', currentMonth)));
        const batch = writeBatch(db);
        let count = 0;
        snap.forEach(doc => {
          const d = doc.data();
          if (Number(d.amount) === 0) { batch.delete(doc.ref); count++; }
        });
        if (count) await batch.commit();
        console.log('Removidos com amount=0:', count);
      };

      window.limparParcelasQueSaoData = async (db, monthKey) => {
        if(!db || !monthKey || !window.FirebaseLib) return;
        const { collection, query, where, getDocs, writeBatch, deleteField } = window.FirebaseLib;
        const exp = collection(db, 'expenses');
        const snap = await getDocs(query(exp, where('monthKey','==', monthKey)));
        const batch = writeBatch(db);
        let count = 0;
        snap.docs.forEach(doc => {
          const d = doc.data() || {};
          if (!d.parcela || !d.date) return;
          const m = String(d.date).match(/^(\d{1,2})\/(\d{1,2})\/\d{2,4}$/);
          if (!m) return;
          const diaMes = `${parseInt(m[1],10)}/${parseInt(m[2],10)}`;
          if (d.parcela === diaMes) {   
              batch.update(doc.ref, { parcela: deleteField() });   
              count++;   
          }
        });
        if (count > 0) await batch.commit();
        console.log('Parcelas removidas (eram dia/mês da data):', count);
      };

      const LoginScreen = ({ auth, initialError = '' }) => {
        const [mode, setMode] = useState('login');
        const [email, setEmail] = useState('');
